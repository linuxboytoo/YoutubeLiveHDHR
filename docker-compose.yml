services:
  youtubehd:
    build: .
    ports:
      - "${PORT:-5004}:${PORT:-5004}"
    volumes:
      - ./config:/config
    environment:
      - BASE_URL=${BASE_URL:-}
      - PORT=${PORT:-5004}
      - HDHR_DEVICE_ID=${HDHR_DEVICE_ID:-12345678}
      - HDHR_DEVICE_AUTH=${HDHR_DEVICE_AUTH:-}
      - HDHR_FRIENDLY_NAME=${HDHR_FRIENDLY_NAME:-YouTubeHDHR}
      - POLL_INTERVAL=${POLL_INTERVAL:-60}
      - CONFIG_PATH=${CONFIG_PATH:-/config/channels.yaml}
    restart: unless-stopped
